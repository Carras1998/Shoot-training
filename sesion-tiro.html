<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0F0F0F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Elite Hoops">
<link rel="manifest" id="pwa-manifest">
<title>Elite Hoops</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--or:#F4611A;--dk:#0F0F0F;--c1:#181818;--c2:#1E1E1E;--bd:#2A2A2A;--tx:#E8E8E8;--mu:#777;--gr:#4CAF6A;--ye:#F4C11A;--nh:64px}
html,body{height:100%;overflow:hidden;background:var(--dk);color:var(--tx)}
body{font-family:'DM Sans',sans-serif}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.screen{flex:1;overflow-y:auto;padding:20px 16px calc(var(--nh) + 20px);display:none;-webkit-overflow-scrolling:touch}
.screen.active{display:block}
#bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nh);background:var(--c1);border-top:1px solid var(--bd);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--mu);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.05em;transition:color .2s;padding:8px 0}
.nb.active{color:var(--or)}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* Timer */
#tov{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#tov.show{display:flex}
#td{font-family:'Bebas Neue',sans-serif;font-size:88px;color:#fff;line-height:1}
#tl{font-size:12px;color:var(--mu);letter-spacing:.12em;text-transform:uppercase;text-align:center;max-width:240px}
.tbtns{display:flex;gap:10px}
.tbtn{padding:11px 22px;border-radius:10px;border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.05em;transition:all .15s}
.tbtn.go{background:var(--or);color:#fff}.tbtn.go:active{transform:scale(.96)}
.tbtn.rs{background:var(--bd);color:var(--tx)}
.tbtn.cl{background:none;border:1px solid var(--bd);color:var(--mu)}
/* Cards */
.card{background:var(--c1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:12px}
.ch{padding:13px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ct{font-weight:600;font-size:14px;color:#fff;display:flex;align-items:center;gap:7px}
.cs{font-size:11px;color:var(--mu);margin-top:2px}
.cb{background:var(--c2);padding:4px 0}
/* Drills */
.dr{display:flex;align-items:flex-start;gap:11px;padding:11px 16px;border-bottom:1px solid #1e1e1e;transition:background .15s}
.dr:last-child{border-bottom:none}
.dr:hover{background:#222}
.dck{width:22px;height:22px;border-radius:6px;border:2px solid var(--bd);flex-shrink:0;cursor:pointer;transition:all .2s;margin-top:1px;display:flex;align-items:center;justify-content:center}
.dck.done{background:var(--or);border-color:var(--or)}
.dck.done::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.di{flex:1}
.dn{font-weight:600;font-size:13px;color:#fff}
.dd{font-size:11px;color:var(--mu);margin-top:2px;line-height:1.5}
.dtgs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.dtg{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.dtg-v{background:rgba(244,97,26,.12);color:var(--or)}
.dtg-t{background:rgba(76,175,106,.12);color:var(--gr)}
.dtg-z{background:rgba(255,255,255,.07);color:#ccc;font-family:'Bebas Neue',sans-serif;font-size:11px}
.dtbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:none;color:var(--mu);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;font-size:15px;transition:all .2s}
.dtbtn:hover{border-color:var(--or);color:var(--or)}
/* Stats bar */
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:14px}
.sc{background:var(--c1);padding:11px 6px;text-align:center}
.sn{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;line-height:1}
.sl{font-size:9px;color:var(--mu);letter-spacing:.07em;text-transform:uppercase;margin-top:2px}
/* Heatmap */
.zone{fill:#1a1a1a;stroke:#0a0a0a;stroke-width:1.2;cursor:pointer;transition:fill .4s,stroke .2s;opacity:.95}
.zone:hover{opacity:1;stroke:#555;stroke-width:2}
.zone.active{stroke:#fff;stroke-width:2.5;opacity:1}
.zlbl{font-family:'Bebas Neue',sans-serif;fill:rgba(255,255,255,.2);pointer-events:none;text-anchor:middle;dominant-baseline:middle}
.zpct{font-family:'Bebas Neue',sans-serif;font-size:8px;pointer-events:none;text-anchor:middle;dominant-baseline:middle}
/* Zone panel */
.zpanel{background:#111;border:1px solid var(--bd);border-radius:12px;padding:14px;transition:border-color .3s;margin-bottom:10px}
.zpanel.sel{border-color:var(--or)}
.zpname{font-weight:600;font-size:13px;color:#fff;margin-bottom:2px}
.zpsub{font-size:11px;color:var(--mu);margin-bottom:10px}
.zinrow{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:flex-end}
.zif label{display:block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:4px}
.zif input{background:#1a1a1a;border:1px solid var(--bd);border-radius:7px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:22px;padding:8px 10px;width:100%;text-align:center;outline:none;-moz-appearance:textfield}
.zif input::-webkit-outer-spin-button,.zif input::-webkit-inner-spin-button{-webkit-appearance:none}
.zif input:focus{border-color:var(--or)}
.sbtn{background:var(--or);border:none;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:15px;padding:10px 14px;border-radius:7px;cursor:pointer;white-space:nowrap;transition:background .2s,transform .1s}
.sbtn:hover{background:#e0541a}.sbtn:active{transform:scale(.96)}
.zfb{font-size:11px;color:var(--gr);margin-top:8px;min-height:14px}
.ztarg{display:flex;align-items:center;gap:8px;margin-top:8px}
.ztarg label{font-size:11px;color:var(--mu);flex:1}
.tinput{background:#1a1a1a;border:1px solid var(--bd);border-radius:6px;color:var(--or);font-family:'Bebas Neue',sans-serif;font-size:16px;padding:4px 8px;width:60px;text-align:center;outline:none;-moz-appearance:textfield}
.tinput::-webkit-outer-spin-button,.tinput::-webkit-inner-spin-button{-webkit-appearance:none}
.tbarw{height:4px;background:var(--bd);border-radius:2px;margin-top:6px;overflow:hidden}
.tbar{height:100%;border-radius:2px;background:var(--or);transition:width .5s}
.zhist{margin-top:10px;border-top:1px solid var(--bd);padding-top:10px}
.zht{font-size:10px;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.zhr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #1a1a1a;font-size:11px}
.zhr:last-child{border-bottom:none}
/* Progress */
.recgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.rcard{background:var(--c2);border:1px solid var(--bd);border-radius:10px;padding:12px}
.rv{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--or);line-height:1}
.rl{font-size:10px;color:var(--mu);letter-spacing:.06em;text-transform:uppercase;margin-top:3px}
/* Plan */
.pcard{background:var(--c1);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
.pav{width:54px;height:54px;background:var(--or);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;box-shadow:0 0 20px rgba(244,97,26,.3)}
.pname{font-weight:600;font-size:16px;color:#fff}
.ppos{font-size:12px;color:var(--mu);margin-top:2px}
.pstats{display:flex;gap:12px;margin-top:8px}
.psi{font-size:11px;color:var(--mu)}
.psi b{color:#fff;font-weight:600}
.wkgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.wkd{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:8px 2px;text-align:center}
.wkd.today{border-color:var(--or);background:rgba(244,97,26,.08)}
.wkd-n{font-size:9px;color:var(--mu);text-transform:uppercase}
.wkd-i{font-size:15px;margin-top:3px}
.wkd-t{font-size:8px;color:var(--mu);margin-top:2px;line-height:1.2}
.progb{background:var(--c1);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:10px}
.progh{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.progt{font-weight:600;font-size:13px;color:#fff;display:flex;align-items:center;gap:7px}
.proga{font-size:12px;color:var(--mu);transition:transform .2s}
.progh.open .proga{transform:rotate(180deg)}
.progbd{display:none;border-top:1px solid var(--bd);background:var(--c2)}
.progbd.open{display:block}
.plv{border-bottom:1px solid #1e1e1e}
.plv:last-child{border-bottom:none}
.plvh{display:flex;align-items:center;gap:7px;padding:11px 16px;cursor:pointer;user-select:none}
.plvh:hover{background:#222}
.plvb{font-family:'Bebas Neue',sans-serif;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bd);color:var(--mu);flex-shrink:0}
.plvb.cur{background:rgba(244,97,26,.2);color:var(--or)}
.plvn{font-weight:600;font-size:12px;color:#fff;flex:1}
.plva{font-size:11px;color:var(--mu);transition:transform .2s;flex-shrink:0}
.plvh.open .plva{transform:rotate(180deg)}
.plvbody{display:none;padding:0 16px 12px;background:#111}
.plvbody.open{display:block}
.plvd{font-size:11px;color:var(--mu);line-height:1.6;margin-bottom:10px}
.plvex{margin-top:4px}
.plvex-item{padding:8px 12px;border-left:2px solid var(--bd);margin-bottom:6px;background:#161616;border-radius:0 6px 6px 0}
.plvex-item.cur{border-left-color:var(--or)}
.plvex-n{font-size:12px;font-weight:600;color:#fff;margin-bottom:3px}
.plvex-d{font-size:11px;color:var(--mu);line-height:1.6}
.plvex-tip{font-size:10px;color:var(--or);margin-top:4px;font-style:italic}
/* timer flash */
@keyframes tcflash{0%,100%{color:#fff}50%{color:var(--or)}}
.tflash{animation:tcflash .4s ease}
/* Misc */
.ph{margin-bottom:20px}
.ptitle{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#fff;line-height:1}
.psub{font-size:12px;color:var(--mu);margin-top:4px}
.typetag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:14px}
.typetag.cancha{background:rgba(244,97,26,.15);color:var(--or)}
.typetag.casa{background:rgba(26,46,74,.4);color:#7aaeee}
.opttag{font-size:10px;color:var(--mu);background:var(--bd);padding:2px 6px;border-radius:4px;margin-left:5px}
.notes{width:100%;background:#111;border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;padding:12px;resize:none;outline:none;transition:border-color .2s}
.notes:focus{border-color:var(--or)}
.btnp{background:var(--or);border:none;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.05em;padding:13px;border-radius:10px;cursor:pointer;width:100%;transition:background .2s;margin-top:10px}
.btnp:hover{background:#e0541a}
.btnout{background:none;border:1px solid var(--bd);color:var(--mu);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .2s}
.btnout:hover{border-color:#e05a5a;color:#e05a5a}
.hcrow{display:flex;align-items:center;gap:12px;background:#111;border:1px solid var(--bd);border-radius:10px;padding:10px 14px;margin-bottom:8px}
.hci{font-size:20px}
.hct{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em}
.hcv{font-size:13px;color:#fff;font-weight:600;margin-top:1px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #1e1e1e}
.srow:last-child{border-bottom:none}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--gr);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:500;white-space:nowrap}
.badge{font-family:'Bebas Neue',sans-serif;font-size:11px;padding:3px 8px;border-radius:4px;background:var(--bd);color:var(--mu)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .4s ease both}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>
<!-- Timer overlay -->
<div id="tov">
  <div id="tl">TEMPORIZADOR</div>
  <div id="td">00:00</div>
  <div class="tbtns">
    <button class="tbtn go" id="ttog" onclick="T.toggle()">INICIAR</button>
    <button class="tbtn rs" onclick="T.reset()">RESET</button>
    <button class="tbtn cl" onclick="T.close()">CERRAR</button>

</div>

<div id="app">
<!-- HOY -->
<div id="screen-hoy" class="screen active">

</div>

    </div>
  </div>
  <div class="zpanel" id="zpanel">
    <div class="zpname" id="zpname">Toca una zona del mapa</div>
    <div class="zpsub" id="zpsub">Selecciona una zona para ver su historial y registrar tiros</div>
    <div class="zinrow">
      <div class="zif"><label>Encestados hoy</label><input type="number" id="zm" min="0" placeholder="0"></div>
      <div class="zif"><label>Intentos hoy</label><input type="number" id="za" min="0" placeholder="0"></div>

<!-- PROGRESO -->

  <div class="ph fu"><div class="ptitle">PROGRESO</div><div class="psub">Evolución sesión a sesión</div></div>
  <div id="prog-root"></div>
</div>

const PROGS=[
  {id:'drib',title:'Dribling',icon:'🏀',levels:[
    {n:'Nivel 1 — Control básico',d:'El 90% de los jugadores amateur jamás consolidan este nivel. Sin él, todo lo demás es humo. Domina estos 3 ejercicios antes de pasar al siguiente nivel.',cur:true,exs:[
      {n:'Bote estático mano dominante',d:'De pie, rodillas ligeramente flexionadas, espalda recta. Bota con la yema de los dedos, no con la palma. 2 minutos sin mirar el balón. Si tienes que mirar, baja la intensidad hasta que no necesites hacerlo.',tip:'Test de nivel: ¿puedes mantener el bote y leer un texto a la vez? Si no, sigue aquí.'},
      {n:'Bote estático mano débil',d:'Exactamente igual pero con la mano no dominante. Tómate el doble de tiempo que con la dominante. La asimetría entre manos es lo que te hace predecible en partido.',tip:'El objetivo no es que sea perfecto, sino que no tengas que pensar en ello.'},
      {n:'Bote bajo y fuerte',d:'Lo más cerca del suelo posible — menos de 30cm. Máxima fuerza en cada bote. Simula proteger el balón cuando un defensor está encima de ti. Alterna manos cada 30 segundos.',tip:'Si el balón sube más de la cadera, no estás botando lo suficientemente fuerte.'},
    ]},
    {n:'Nivel 2 — Cambios de mano',d:'Solo cuando el bote básico sea completamente automático. El orden importa: crossover primero, entre piernas después, por la espalda al final.',exs:[
      {n:'Crossover',d:'Cambio de mano por delante del cuerpo. El balón debe pasar justo frente a las caderas, no delante del pecho (demasiado alto = fácil de robar). Empieza lento y sube velocidad solo cuando el gesto sea limpio.',tip:'Si tienes que girar el torso para hacer el crossover, es demasiado alto. Practica encogiéndote más.'},
      {n:'Entre piernas (between the legs)',d:'Más difícil que el crossover porque requiere coordinación entre manos y pies. Paso derecho adelante → bota entre piernas con mano derecha hacia la izquierda. Paso izquierdo adelante → al revés. Empieza parado, luego en movimiento.',tip:'Los primeros días perderás el balón constantemente. Es normal. La coordinación viene con la repetición.'},
      {n:'Por la espalda (behind the back)',d:'El más difícil. Solo entrarlo cuando los anteriores sean completamente automáticos. La mecánica: el balón pasa por detrás de las caderas, no de los hombros. Practica primero sin moverse, luego caminando.',tip:'Un behind the back mal hecho es peor que un crossover limpio. No lo uses en partido hasta que sea automático.'},
    ]},
    {n:'Nivel 3 — Movimiento real',d:'El dribling en partido nunca es estático. Aquí integras todo en movimiento con cambios de dirección y presión defensiva imaginaria.',exs:[
      {n:'Combinaciones en movimiento',d:'Crossover → entre piernas → crossover en secuencia caminando por la pista. Luego corriendo. Luego con cambio de ritmo (lento-rápido-lento). El objetivo es que el cerebro deje de pensar en el gesto.',tip:'Cuando no tengas que pensar en qué movimiento viene después, estás en nivel 3.'},
      {n:'Dribling con oponente imaginario',d:'Ponte en la esquina, imagina un defensor. Bota hacia él, haz un crossover para pasar, acelera hacia el aro. Trabaja todas las zonas de la pista. Foco en el cambio de ritmo — velocidad lenta antes del movimiento, explosión después.',tip:'Los mejores jugadores no son los más rápidos, son los más impredecibles. El cambio de ritmo es la habilidad clave.'},
    ]},
  ]},
  {id:'def',title:'Defensa',icon:'🛡️',levels:[
    {n:'Nivel 1 — Postura y slides',d:'La defensa empieza con la postura. Sin la postura correcta todo lo demás falla. Domina estos fundamentos antes de intentar anticipar jugadas.',cur:true,exs:[
      {n:'Postura defensiva estática',d:'Pies más anchos que los hombros, rodillas flexionadas a 90-110°, caderas bajas, espalda recta — no encorvada. El peso en las puntas de los pies, nunca en los talones. Brazos abiertos, manos activas. Mantén esta postura 2 minutos sin "descansar" subiéndote.',tip:'Test: si te empujan suavemente desde un lado y pierdes el equilibrio, tus caderas están demasiado altas. Baja más.'},
      {n:'Defensive slides',d:'Desde la postura defensiva, desplázate lateralmente SIN cruzar los pies — el pie de atrás empuja, el pie de delante arrastra. Nunca cruces. Mantén la postura durante todo el movimiento. 3 series de 30 segundos al máximo.',tip:'Cuando estés fatigado el primer instinto es cruzar los pies y perder la postura. Ahí es donde más tienes que resistir.'},
      {n:'Manos activas',d:'En postura defensiva, mueve las manos continuamente arriba y abajo. Simula interrumpir el campo de visión del atacante y dificultar el pase. La mano de delante va al balón, la de atrás corta el pase interior.',tip:'Las manos activas son gratis — no cuestan energía y molestan muchísimo al atacante.'},
    ]},
    {n:'Nivel 2 — Closeout y anticipación',d:'Saber ponerse entre el atacante y el aro es la habilidad más importante del defensor sin balón.',exs:[
      {n:'Closeout técnico',d:'Sal corriendo fuerte hacia el tirador, pero los ÚLTIMOS 2-3 pasos acorta el paso, abre los pies y frena en postura defensiva. Si llegas a toda velocidad y no frenas, el atacante te supera con un bote. El closeout bien hecho termina en postura defensiva lista para reaccionar.',tip:'El error más común: llegar demasiado cerca. Frena a un paso y medio del tirador para no ser superado.'},
      {n:'Leer la dirección del bote',d:'El atacante te dirá hacia dónde va antes de que se mueva: observa sus caderas, no sus pies ni sus manos. Las caderas van primero. Practica mirando las caderas de un compañero que camina y predice su próximo paso.',tip:'El defensor de élite reacciona a las caderas, no al balón. El balón ya pasó cuando lo ves.'},
    ]},
    {n:'Nivel 3 — Defensa en vivo',d:'Aplicar todo en situaciones reales de 1vs1 y trabajo de equipo.',exs:[
      {n:'Defensa 1vs1 real',d:'Con un compañero: el atacante parte del perímetro y puede botar, pasar o tirar. El defensor aplica postura, slides y closeout en tiempo real. Empieza dando ventaja al atacante — que arranque ya botando — y conforme mejoras, reduces esa ventaja.',tip:'Perder el 1vs1 en entrenamiento es bueno. Si siempre ganas es porque el ejercicio es demasiado fácil.'},
      {n:'Defensa del pick and roll',d:'El atacante recibe un bloqueo. El defensor tiene dos opciones: pasar por debajo (permite tiro exterior) o luchar por encima (permite drive interior). Decide según el tirador. Un tirador de 16% exterior → pasa por debajo, deja el triple. Un 40% exterior → lucha por encima.',tip:'La decisión importa más que la ejecución. La táctica equivocada ejecutada perfectamente sigue siendo un error.'},
    ]},
  ]},
  {id:'tiro',title:'Tiro',icon:'🎯',levels:[
    {n:'Nivel 1 — Mecánica estática',d:'El 99% de los jugadores que fallan tiros lo hacen por mecánica deficiente, no por falta de práctica. Construye la mecánica primero o estarás repitiendo errores miles de veces.',cur:true,exs:[
      {n:'Form shooting 1 mano — zona C',d:'A 1-1.5m del aro. SOLO la mano dominante. Coloca el balón en la yema de los dedos, no en la palma. Codo alineado con la rodilla y el pie. Empuja hacia arriba y adelante con un arco de 45-50°. Follow-through completo — la mano debe quedar apuntando al aro como metiendo la mano en un cubo. 3 series de 10.',tip:'Si el balón gira hacia los lados al salir, tu muñeca no está completamente volcada en el follow-through.'},
      {n:'BEEF — check de mecánica',d:'Balance: pies alineados con el aro, pie de la mano de tiro ligeramente adelante. Eyes: fija la vista en el borde trasero del aro. Elbow: codo bajo el balón. Follow-through: mano queda colgando como si metieras la mano en un cubo de agua. Revisa estos 4 puntos en cada tiro hasta que sean automáticos.',tip:'Grábate en vídeo lateral. El codo que sobresale hacia afuera es el error más común y más fácil de corregir viéndote.'},
      {n:'Wall drill',d:'Dispara rozando una pared lateral. Si el balón la toca, la mano guía (la que no tira) está empujando el balón. La mano guía SOLO sostiene el balón antes de tirar — no aplica fuerza. Este drill revela si tienes este error en segundos.',tip:'La mano guía es la enemiga silenciosa del tiro. La mayoría no sabe que la están usando hasta que hacen este drill.'},
    ]},
    {n:'Nivel 2 — Catch & shoot',d:'Añadir footwork al tiro. Recibir el balón en movimiento y disparar en un solo movimiento fluido.',exs:[
      {n:'Ball pickup con 1-2 step',d:'Deja el balón en el suelo, aléjate 2 pasos, vuelve, recógelo y dispara en un movimiento continuo. El catch y el inicio del salto son prácticamente simultáneos. Empieza por M1 y M5 (zonas más fáciles) y progresa hacia las triples.',tip:'El error más común: frenar completamente al recoger el balón. El ritmo no se rompe — catch y salto son casi un solo movimiento.'},
      {n:'Spot shooting con movimiento lateral',d:'Empieza en M2, tira, recoge el rebote, desplázate a M3, tira, desplázate a M4, tira. No pares entre tiros. Simula el ritmo de partido donde nunca tiras desde posición estática perfecta.',tip:'Cuando el % baje mucho respecto a tiro estático, es señal de que el footwork está interrumpiendo la mecánica. Ralentiza hasta que vuelvan a igualarse.'},
    ]},
    {n:'Nivel 3 — Tiro en partido',d:'Creación propia de tiro bajo presión defensiva y con fatiga.',exs:[
      {n:'Pull-up tras bote',d:'Bota 2-3 veces hacia la zona, para en seco con 1-2 step y tira. La parada en seco es el 90% del ejercicio — si no paras bien no puedes tirar en equilibrio. Trabaja desde M2 y M4 hacia el aro.',tip:'Los mejores step backs del mundo vienen después de dominar la parada en seco. No al revés.'},
      {n:'Tiro con fatiga',d:'Haz 5 sprints de 10 metros, luego dispara 5 tiros seguidos desde M1. Descansa. Repite. Tu mecánica con el corazón a 170 ppm es la que importa en el cuarto tiempo del partido.',tip:'Si tu % cae más de un 15% con fatiga respecto a descansado, necesitas más work de resistencia específica.'},
    ]},
  ]},
  {id:'fis',title:'Físico Específico',icon:'⚡',levels:[
    {n:'Nivel 1 — Explosividad base',d:'El baloncesto son sprints de 2-4 segundos, no resistencia de fondo. Trabaja la explosividad desde el primer día — es tu mayor ventaja siendo atlético.',cur:true,exs:[
      {n:'Saltos máximos verticales',d:'Desde parado, salto vertical máximo con ambas pies. 5 series de 5 saltos con 30 segundos de descanso entre series. Cada salto con máxima intención — no hagas series "de calentamiento". La calidad importa más que la cantidad.',tip:'Mide tu altura con una marca en la pared. El progreso en cm de salto vertical es el indicador más honesto de la mejora explosiva.'},
      {n:'Sprint stops',d:'Arrancada explosiva de 5-6 pasos a máxima velocidad y parada BRUSCA en seco con los dos pies. La parada es tan importante como la arrancada — simula los cortes en partido. 10 repeticiones con 20 segundos de descanso.',tip:'Si al parar pierdes el equilibrio hacia delante, necesitas fortalecer los cuádriceps. Si te vas hacia atrás, los isquios.'},
      {n:'Lateral quickness',d:'2 conos o marcas separados 3-4 metros. Desplazamiento lateral máximo entre ellos sin cruzar los pies (igual que defensive slides pero al máximo de velocidad). 6 series de 10 segundos con 20 de descanso.',tip:'Cronométrate. ¿Cuántos toques haces en 10 segundos? Ese número mejorará con las semanas.'},
    ]},
    {n:'Nivel 2 — Agilidad con balón',d:'Integrar el balón en los drills físicos. El objetivo es que el balón no frene tu velocidad de movimiento.',exs:[
      {n:'Lateral quickness con bote',d:'Igual que el lateral quickness del nivel 1 pero botando el balón durante todo el ejercicio. La coordinación mano-pie es el reto. Empieza más lento y sube velocidad conforme la coordinación mejora.',tip:'Si el bote se descontrola al cambiar de dirección, tu bote básico todavía no es suficientemente automático. Vuelve al nivel 1 de dribling.'},
      {n:'Sprint stop con catch and shoot',d:'Sprint de 5 metros, parada en seco, y lanza hacia un punto fijo (o dispara al aro si estás en pista). El equilibrio en la parada es lo que permite el tiro preciso tras movimiento explosivo.',tip:'Este drill une el físico y el tiro. Los jugadores que ejecutan bien esto son los más peligrosos en partido.'},
    ]},
    {n:'Nivel 3 — Condición específica',d:'Circuitos que simulan el trabajo real de un partido: ráfagas de intensidad máxima con recuperación parcial.',exs:[
      {n:'Circuito completo',d:'Sprint 5m → parada → bote 5 segundos → tiro desde M2 → sprint a recuperar rebote → defensive slide 5m → repetir. 4 rondas de 3 minutos con 1 minuto de descanso entre rondas. Tu cuerpo y tu mecánica de tiro con fatiga máxima.',tip:'Si el % de tiro al final del circuito es similar al del principio, tu condición específica es buena. Si cae en picado, necesitas más base cardiovascular.'},
    ]},
  ]},
];

function dbLoad(){try{return JSON.parse(localStorage.getItem(KEY))||dbDefault()}catch{return dbDefault()}}
function dbSave(d){localStorage.setItem(KEY,JSON.stringify(d))}
function today(){return new Date().toISOString().split('T')[0]}
function dbDefault(){
  const t=today();
  return{
    profile:{name:'Sergio',height:178,weight:76,wingspan:173,pos:'Base / Escolta'},
    zones:{
      c:{records:[],target:70},
      m1:{records:[{date:t,made:3,att:10}],target:40},
      m2:{records:[{date:t,made:2,att:10}],target:40},
      m3:{records:[{date:t,made:2,att:10}],target:40},
      m4:{records:[{date:t,made:1,att:10}],target:40},
      m5:{records:[{date:t,made:1,att:10}],target:40},
      t1:{records:[{date:t,made:1,att:10}],target:35},
      t2:{records:[{date:t,made:0,att:10}],target:35},
      t3:{records:[{date:t,made:2,att:10}],target:35},
      t4:{records:[{date:t,made:2,att:10}],target:35},
      t5:{records:[{date:t,made:2,att:10}],target:35},
    },
    sessions:[],
  };
}

/* ── COLOR ── */
function p2c(p){
  if(p<10)return'#1a3cff';if(p<20)return'#2255ee';if(p<30)return'#2272cc';
  if(p<40)return'#3a7a8a';if(p<50)return'#cc6622';if(p<60)return'#dd3322';
  if(p<70)return'#cc1133';if(p<80)return'#9922aa';if(p<90)return'#7700cc';
  return'#5500ee';
}
function p2t(p){
  if(p<40)return'rgba(160,210,255,.95)';
  if(p<60)return'rgba(255,210,140,.95)';
  if(p<70)return'rgba(255,160,150,.95)';
  return'rgba(225,160,255,.95)';
}

/* ── NAV ── */
let _sel=null;
function nav(sc){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+sc).classList.add('active');
  document.querySelector('[data-sc="'+sc+'"]').classList.add('active');
  if(sc==='hoy')renderHoy();
  if(sc==='mapa')renderMapa();
  if(sc==='progreso')renderProg();
  if(sc==='plan')renderPlan();
}

/* ── TOAST ── */
function toast(msg){
  const el=document.createElement('div');
  el.className='toast fu';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2200);
}

/* ── HOY ── */
function renderHoy(){
  const day=new Date().getDay();
  const plan=WP[day];
  const db=dbLoad();
  const t=today();
  const sess=db.sessions.find(s=>s.date===t)||{completedDrills:[],notes:''};
  const DN=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MN=['enero','feb','marzo','abril','mayo','junio','julio','ago','sept','oct','nov','dic'];
  const now=new Date();
  const ds=now.getDate()+' de '+MN[now.getMonth()];
  let h=`<div class="ph fu"><div class="ptitle">${DN[day].toUpperCase()}</div><div class="psub">${ds} · ${plan.title}</div></div>
  <div class="typetag ${plan.type}">${plan.icon} ${plan.type==='cancha'?'Sesión en cancha':'Entrenamiento en casa'}</div>`;
  plan.blocks.forEach(bl=>{
    const done=bl.drills.filter(d=>(sess.completedDrills||[]).includes(d.id)).length;
    h+=`<div class="card fu"><div class="ch"><div><div class="ct">${bl.icon} ${bl.title}${bl.opt?'<span class="opttag">opcional</span>':''}</div><div class="cs">${bl.sub}</div></div>
    <span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:${done===bl.drills.length?'#4CAF6A':'var(--mu)'};">${done}/${bl.drills.length}</span></div><div class="cb">`;
    bl.drills.forEach(dr=>{
      const dn=(sess.completedDrills||[]).includes(dr.id);
      h+=`<div class="dr"><div class="dck ${dn?'done':''}" onclick="toggleDrill('${dr.id}')"></div>
      <div class="di"><div class="dn" style="${dn?'opacity:.4;text-decoration:line-through':''}">${dr.n}</div>
      <div class="dd">${dr.d}</div><div class="dtgs"><span class="dtg dtg-v">${dr.tag}</span>${dr.z?`<span class="dtg dtg-z">📍 ${dr.z}</span>`:''}</div></div>
      ${dr.t?`<button class="dtbtn" onclick="T.open(${dr.t},'${dr.n.substring(0,30)}')" title="Temporizador">⏱</button>`:''}
      </div>`;
    });
    h+=`</div></div>`;
  });
  h+=`<div class="card fu"><div class="ch"><div class="ct">📝 Notas de sesión</div></div>
  <div style="padding:12px"><textarea class="notes" id="snotes" rows="4" placeholder="¿Cómo ha ido? Zonas que mejoran, sensaciones, qué trabajar la próxima...">${sess.notes||''}</textarea>
  <button class="btnp" onclick="saveSession()">GUARDAR SESIÓN</button></div></div>`;
  document.getElementById('hoy-root').innerHTML=h;
}

function toggleDrill(id){
  const db=dbLoad();const t=today();
  let sess=db.sessions.find(s=>s.date===t);
  if(!sess){sess={date:t,completedDrills:[],notes:''};db.sessions.push(sess);}
  const i=sess.completedDrills.indexOf(id);
  if(i>=0)sess.completedDrills.splice(i,1);else sess.completedDrills.push(id);
  dbSave(db);renderHoy();
}

function saveSession(){
  const db=dbLoad();const t=today();
  let sess=db.sessions.find(s=>s.date===t);
  if(!sess){sess={date:t,completedDrills:[],notes:''};db.sessions.push(sess);}
  const n=document.getElementById('snotes');
  if(n)sess.notes=n.value;
  dbSave(db);toast('✓ Sesión guardada');
}

/* ── MAPA ── */
function renderMapa(){
  const db=dbLoad();
  let tm=0,ta=0,best=null,worst=null;
  const dates=new Set();
  Object.keys(ZD).forEach(id=>{
    const z=db.zones[id]||{records:[],target:null};
    const made=z.records.reduce((a,r)=>a+r.made,0);
    const att=z.records.reduce((a,r)=>a+r.att,0);
    z.records.forEach(r=>dates.add(r.date));
    const has=att>0;const p=has?Math.round(made/att*100):0;
    const el=document.getElementById('hz-'+id);
    if(el)el.style.fill=has?p2c(p):'';
    const lbl=document.getElementById('pct-'+id);
    if(lbl){lbl.textContent=has?p+'%':'';if(has)lbl.style.fill=p2t(p);}
    tm+=made;ta+=att;
    if(has){
      if(!best||p>best.p)best={id,p,l:ZD[id].l,made,att};
      if(!worst||p<worst.p)worst={id,p,l:ZD[id].l,made,att};
    }
  });
  const sess=dates.size||1;
  document.getElementById('mapa-sbar').innerHTML=`
    <div class="sc"><div class="sn">${sess}</div><div class="sl">Sesiones</div></div>
    <div class="sc"><div class="sn">${tm}</div><div class="sl">Encestados</div></div>
    <div class="sc"><div class="sn">${ta}</div><div class="sl">Intentos</div></div>
    <div class="sc"><div class="sn">${ta>0?Math.round(tm/ta*100)+'%':'—'}</div><div class="sl">% Global</div></div>`;
  let hc='';
  if(best&&worst&&best.id!==worst.id){
    hc=`<div class="hcrow"><span class="hci">🔥</span><div><div class="hct">Zona caliente</div><div class="hcv">${best.l} — ${best.p}% (${best.made}/${best.att})</div></div></div>
    <div class="hcrow"><span class="hci">🧊</span><div><div class="hct">Zona fría — a trabajar</div><div class="hcv">${worst.l} — ${worst.p}% (${worst.made}/${worst.att})</div></div></div>`;
  }
  document.getElementById('hcwrap').innerHTML=hc;
}

const M={
  sel(id,label){
    _sel=id;
    document.querySelectorAll('.zone').forEach(z=>z.classList.remove('active'));
    const el=document.getElementById('hz-'+id);if(el)el.classList.add('active');
    const db=dbLoad();
    const z=db.zones[id]||{records:[],target:null};
    const made=z.records.reduce((a,r)=>a+r.made,0);
    const att=z.records.reduce((a,r)=>a+r.att,0);
    const p=att>0?Math.round(made/att*100):null;
    document.getElementById('zpname').textContent=label;
    document.getElementById('zpsub').textContent=att>0?`Acumulado: ${made}/${att} (${p}%) · ${z.records.length} sesión(es)`:'Sin datos todavía — ¡primera vez en esta zona!';
    document.getElementById('zm').value='';
    document.getElementById('za').value='';
    document.getElementById('zfb').textContent='';
    document.getElementById('zpanel').classList.add('sel');
    document.getElementById('zti').value=z.target||'';
    M.updTbar(p,z.target);
    const hist=document.getElementById('zhist');
    if(z.records.length>0){
      const rec=[...z.records].reverse().slice(0,5);
      hist.innerHTML=`<div class="zht">Últimas sesiones</div>`+rec.map(r=>{
        const rp=Math.round(r.made/r.att*100);
        return `<div class="zhr"><span style="color:var(--mu)">${r.date}</span><span style="color:var(--mu)">${r.made}/${r.att}</span><span style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:${p2c(rp)}">${rp}%</span></div>`;
      }).join('');
    }else{hist.innerHTML='';}
    document.getElementById('zm').focus();
  },
  save(){
    if(!_sel)return;
    const made=parseInt(document.getElementById('zm').value)||0;
    const att=parseInt(document.getElementById('za').value)||0;
    if(!att){document.getElementById('zfb').textContent='⚠ Ingresa al menos los intentos.';return;}
    if(made>att){document.getElementById('zfb').textContent='⚠ Encestados no pueden superar intentos.';return;}
    const db=dbLoad();
    if(!db.zones[_sel])db.zones[_sel]={records:[],target:null};
    db.zones[_sel].records.push({date:today(),made,att});
    dbSave(db);
    const z=db.zones[_sel];
    const tm=z.records.reduce((a,r)=>a+r.made,0);
    const ta=z.records.reduce((a,r)=>a+r.att,0);
    const p=Math.round(tm/ta*100);
    const tp=Math.round(made/att*100);
    document.getElementById('zfb').textContent=`✓ Guardado — hoy: ${made}/${att} (${tp}%) · Total: ${tm}/${ta} (${p}%)`;
    document.getElementById('zm').value='';document.getElementById('za').value='';
    M.updTbar(p,z.target);
    renderMapa();
    M.sel(_sel,ZD[_sel]?.l||_sel);
  },
  saveTgt(){
    if(!_sel)return;
    const v=parseInt(document.getElementById('zti').value)||null;
    const db=dbLoad();
    if(!db.zones[_sel])db.zones[_sel]={records:[],target:null};
    db.zones[_sel].target=v;dbSave(db);
    const z=db.zones[_sel];
    const made=z.records.reduce((a,r)=>a+r.made,0);
    const att=z.records.reduce((a,r)=>a+r.att,0);
    M.updTbar(att>0?Math.round(made/att*100):0,v);
  },
  updTbar(cur,tgt){
    const bar=document.getElementById('ztbar');if(!bar)return;
    if(!tgt||cur===null){bar.style.width='0%';return;}
    const pct=Math.min((cur/tgt)*100,100);
    bar.style.width=pct+'%';
    bar.style.background=pct>=100?'#4CAF6A':'var(--or)';
  },
  reset(){
    if(!confirm('¿Borrar TODOS los datos de tiro? No se puede deshacer.'))return;
    const db=dbLoad();
    Object.keys(db.zones).forEach(id=>{db.zones[id].records=[];});
    dbSave(db);_sel=null;
    document.querySelectorAll('.zone').forEach(z=>{z.classList.remove('active');z.style.fill='';});
    document.querySelectorAll('.zpct').forEach(l=>l.textContent='');
    document.getElementById('zpanel').classList.remove('sel');
    document.getElementById('zpname').textContent='Toca una zona del mapa';
    document.getElementById('zpsub').textContent='Selecciona una zona para ver su historial y registrar tiros';
    document.getElementById('zhist').innerHTML='';
    document.getElementById('hcwrap').innerHTML='';
    renderMapa();
  }
};

/* ── PROGRESO ── */
function renderProg(){
  const db=dbLoad();
  const byDate={};
  Object.keys(ZD).forEach(id=>{
    (db.zones[id]?.records||[]).forEach(r=>{
      if(!byDate[r.date])byDate[r.date]={made:0,att:0};
      byDate[r.date].made+=r.made;byDate[r.date].att+=r.att;
    });
  });
  const dates=Object.keys(byDate).sort();
  const tMade=dates.reduce((a,d)=>a+byDate[d].made,0);
  const tAtt=dates.reduce((a,d)=>a+byDate[d].att,0);
  const gPct=tAtt>0?Math.round(tMade/tAtt*100):0;
  let bestPct=0,bestDate='—';
  dates.forEach(d=>{const p=byDate[d].att>0?Math.round(byDate[d].made/byDate[d].att*100):0;if(p>bestPct){bestPct=p;bestDate=d;}});
  let bZone=null,wZone=null;
  Object.keys(ZD).forEach(id=>{
    const z=db.zones[id]||{records:[]};
    const m=z.records.reduce((a,r)=>a+r.made,0);
    const a=z.records.reduce((a,r)=>a+r.att,0);
    if(a<5)return;const p=Math.round(m/a*100);
    if(!bZone||p>bZone.p)bZone={id,p,l:ZD[id].l};
    if(!wZone||p<wZone.p)wZone={id,p,l:ZD[id].l};
  });
  let h=`<div class="card fu"><div class="ch"><div class="ct">🏆 Récords</div></div>
  <div class="recgrid">
    <div class="rcard"><div class="rv">${tAtt}</div><div class="rl">Tiros totales</div></div>
    <div class="rcard"><div class="rv">${tAtt>0?gPct+'%':'—'}</div><div class="rl">% global</div></div>
    <div class="rcard"><div class="rv">${dates.length||1}</div><div class="rl">Sesiones</div></div>
    <div class="rcard"><div class="rv">${bestPct>0?bestPct+'%':'—'}</div><div class="rl">Mejor sesión</div></div>
  </div></div>`;
  
  // Chart
  if(dates.length>0){
    const pts=dates.map(d=>({date:d.slice(5),p:byDate[d].att>0?Math.round(byDate[d].made/byDate[d].att*100):0}));
    const mx=Math.max(...pts.map(x=>x.p),60);
    const W=340,H=110,PX=28,PY=20;
    const xs=(i)=>PX+i*(W-PX*2)/(Math.max(pts.length-1,1));
    const ys=(p)=>H-PY-(p/mx)*(H-PY*1.8);
    const poly=pts.map((p,i)=>`${xs(i)},${ys(p.p)}`).join(' ');
    h+=`<div class="card fu"><div class="ch"><div class="ct">📈 Evolución del tiro</div></div>
    <div style="padding:14px 10px 8px">
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
      ${[0,25,50,75].filter(v=>v<=mx).map(v=>`<line x1="${PX}" y1="${ys(v)}" x2="${W-PX}" y2="${ys(v)}" stroke="#2a2a2a" stroke-width="1"/>
      <text x="${PX-4}" y="${ys(v)+3}" font-family="Bebas Neue" font-size="9" fill="#555" text-anchor="end">${v}%</text>`).join('')}
      ${pts.length>1?`<polyline points="${poly}" fill="none" stroke="#F4611A" stroke-width="2" stroke-linejoin="round"/>`:''}
      ${pts.map((p,i)=>`<circle cx="${xs(i)}" cy="${ys(p.p)}" r="3.5" fill="#F4611A"/>
      <text x="${xs(i)}" y="${H-4}" font-family="Bebas Neue" font-size="8" fill="#555" text-anchor="middle">${p.date}</text>`).join('')}
    </svg></div></div>`;
  }
  
  // Zone breakdown
  h+=`<div class="card fu"><div class="ch"><div class="ct">🗺️ Desglose por zonas</div></div><div style="padding:6px 0">`;
  Object.keys(ZD).forEach(id=>{
    const z=db.zones[id]||{records:[],target:null};
    const m=z.records.reduce((a,r)=>a+r.made,0);
    const a=z.records.reduce((a,r)=>a+r.att,0);
    const p=a>0?Math.round(m/a*100):null;
    const tgt=z.target;
    h+=`<div style="padding:8px 16px;border-bottom:1px solid #1e1e1e">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;align-items:center">
        <span style="font-size:12px;color:#ccc">${ZD[id].l}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:10px;color:var(--mu)">${a>0?m+'/'+a:'—'}</span>
          <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:${p!==null?p2c(p):'var(--mu)'}">${p!==null?p+'%':'—'}</span>
        </div>
      </div>
      <div style="height:4px;background:var(--bd);border-radius:2px;overflow:hidden">
        <div style="height:100%;border-radius:2px;background:${p!==null?p2c(p):'transparent'};width:${p!==null?p+'%':'0'}"></div>
      </div>
      ${tgt?`<div style="font-size:9px;color:var(--mu);margin-top:2px">Obj: ${tgt}% ${p!==null?(p>=tgt?'✅':'→ faltan '+(tgt-p)+'%'):'sin datos'}</div>`:''}
    </div>`;
  });
  h+=`</div></div>`;
  
  if(bZone||wZone){
    h+=`<div style="margin-bottom:12px">`;
    if(bZone)h+=`<div class="hcrow"><span class="hci">🔥</span><div><div class="hct">Zona más consistente</div><div class="hcv">${bZone.l} — ${bZone.p}%</div></div></div>`;
    if(wZone)h+=`<div class="hcrow"><span class="hci">🎯</span><div><div class="hct">Mayor margen de mejora</div><div class="hcv">${wZone.l} — ${wZone.p}%</div></div></div>`;
    h+=`</div>`;
  }
  document.getElementById('prog-root').innerHTML=h;
}

/* ── TIMER ── */
let _tInt=null,_tSec=0,_tTgt=0,_tRun=false;
let _ac=null;
function getAC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}

function playBeep(freq,dur,vol){
  try{
    const ac=getAC();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.value=freq;o.type='sine';
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.start(ac.currentTime);o.stop(ac.currentTime+dur);
  }catch(e){}
}

function playBell(){
  try{
    const ac=getAC();
    const t=ac.currentTime;
    // Boxing bell = multiple harmonics with different decay rates
    const freqs=[[880,1.0],[1760,0.6],[2640,0.4],[3520,0.25],[440,0.5],[1320,0.35]];
    freqs.forEach(([f,v])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(v*1.2,t);
      g.gain.exponentialRampToValueAtTime(v*0.3,t+0.08);
      g.gain.exponentialRampToValueAtTime(0.001,t+2.8);
      o.start(t);o.stop(t+3);
    });
    // Metallic click at attack
    const buf=ac.createBuffer(1,ac.sampleRate*0.05,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/500);
    const src=ac.createBufferSource(),ng=ac.createGain();
    src.buffer=buf;src.connect(ng);ng.connect(ac.destination);
    ng.gain.value=0.7;src.start(t);
  }catch(e){}
}

const T={
  open(sec,lbl){
    _tSec=sec;_tTgt=sec;_tRun=false;
    clearInterval(_tInt);
    document.getElementById('td').textContent=T.fmt(sec);
    document.getElementById('tl').textContent=(lbl||'temporizador').toUpperCase().substring(0,40);
    document.getElementById('ttog').textContent='INICIAR';
    document.getElementById('tov').classList.add('show');
    // unlock AudioContext on user gesture
    try{const ac=getAC();if(ac.state==='suspended')ac.resume();}catch(e){}
  },
  close(){clearInterval(_tInt);_tRun=false;document.getElementById('tov').classList.remove('show');},
  toggle(){
    if(_tRun){clearInterval(_tInt);_tRun=false;document.getElementById('ttog').textContent='REANUDAR';}
    else{
      try{const ac=getAC();if(ac.state==='suspended')ac.resume();}catch(e){}
      _tRun=true;document.getElementById('ttog').textContent='PAUSAR';
      _tInt=setInterval(()=>{
        _tSec--;
        const td=document.getElementById('td');
        td.textContent=T.fmt(_tSec);
        if(_tSec===3||_tSec===2||_tSec===1){
          playBeep(1100,0.18,0.9);
          td.classList.remove('tflash');void td.offsetWidth;td.classList.add('tflash');
        }
        if(_tSec<=0){
          clearInterval(_tInt);_tRun=false;
          document.getElementById('ttog').textContent='INICIAR';
          td.textContent='00:00';
          playBell();
          if(navigator.vibrate)navigator.vibrate([400,100,400,100,600]);
        }
      },1000);
    }
  },
  reset(){clearInterval(_tInt);_tRun=false;_tSec=_tTgt;document.getElementById('td').textContent=T.fmt(_tTgt);document.getElementById('ttog').textContent='INICIAR';},
  fmt(s){const m=Math.floor(Math.abs(s)/60);const sc=Math.abs(s)%60;return(m<10?'0':'')+m+':'+(sc<10?'0':'')+sc;}
};
